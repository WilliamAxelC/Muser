server {
    listen 8080;
    server_name localhost;

    # Root for static files
    root /usr/share/nginx/html;
    index index.html;

    # Explicit blocks for static assets to prevent index.html fallback
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|json|webmanifest)$ {
        try_files $uri =404;
    }

    # Proxy /api/ to Backend
    location /api/ {
        proxy_pass http://sync-backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Socket.io to Backend
    location ^~ /socket.io/ {
        proxy_pass http://sync-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 86400;
    }

    # Backend Health Check
    location /health {
        proxy_pass http://sync-backend:3000/health;
        proxy_set_header Host $host;
    }

    # PWA Support: Redirect all other routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
